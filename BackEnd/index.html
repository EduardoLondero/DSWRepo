<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="createSport">

        <label for="sportName"> Name: </label>
        <input type="text" id="sportName" name="sportName" required> <br><br>

        <label for="sportSchedule"> Schedule: </label>
        <input type="text" id="sportSchedule" name="sportSchedule" required> <br><br>

        <label for="sportPrice"> Price: </label>
        <input type="number" id="sportPrice" name="sportPrice" required> <br><br>

        <input type="submit" value="Send">

    </form>
    <div id="infoRegistrada"></div>


    <script type="module" src="createSport.js"></script>


</body>

</html>
